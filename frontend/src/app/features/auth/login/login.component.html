<div class="login-wrapper">
  <div class="login-card">
    <h2 class="login-title">Iniciar Sesión</h2>
    <p class="login-subtitle">Sistema de Gestión de Créditos</p>

    @if (error) {
      <div class="alert alert-error">{{ error }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">Usuario</label>
        <input
          id="username"
          type="text"
          class="form-input"
          [class.input-error]="isInvalid('username')"
          formControlName="username"
          placeholder="Ingrese su usuario"
          autocomplete="username"
        />
        @if (isInvalid('username')) {
          <span class="error-msg">Usuario requerido.</span>
        }
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          class="form-input"
          [class.input-error]="isInvalid('password')"
          formControlName="password"
          placeholder="Ingrese su contraseña"
          autocomplete="current-password"
        />
        @if (isInvalid('password')) {
          <span class="error-msg">Contraseña requerida.</span>
        }
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>
  </div>
</div>
